name: Deploy translation API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-translation-api.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Deploy Worker
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config wrangler.toml

      - name: Configure provider secrets
        working-directory: api
        env:
          AGNES_AI_API_KEY: ${{ secrets.AGNES_AI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_KEY_GLAI: ${{ secrets.OPENROUTER_KEY_GLAI }}
          OPENROUTER_KEY_NVIDIA: ${{ secrets.OPENROUTER_KEY_NVIDIA }}
          OPENROUTER_KEY_QWEN3: ${{ secrets.OPENROUTER_KEY_QWEN3 }}
          OPENROUTER_KEY_MINIMAX: ${{ secrets.OPENROUTER_KEY_MINIMAX }}
          OPENROUTER_FREE_API_KEY: ${{ secrets.OPENROUTER_FREE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EXTENSION_TOKEN: ${{ secrets.TRANSLATOR_EXTENSION_TOKEN }}
        run: |
          set -euo pipefail
          for name in AGNES_AI_API_KEY GEMINI_API_KEY GROQ_API_KEY OPENROUTER_KEY_GLAI OPENROUTER_KEY_NVIDIA OPENROUTER_KEY_QWEN3 OPENROUTER_KEY_MINIMAX OPENROUTER_FREE_API_KEY DEEPSEEK_API_KEY EXTENSION_TOKEN; do
            value="${!name:-}"
            if [ -n "$value" ]; then
              printf '%s' "$value" | wrangler secret put "$name" --config wrangler.toml
            fi
          done
